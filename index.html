<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ferramentas</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icon.png">
</head>

<body>

<div class="container">

    <!-- Conversor -->
    <div class="card">
        <h2>Conversor de Texto</h2>

        <textarea id="texto" placeholder="Digite algo..."></textarea>

        <div class="botoes">
            <button onclick="maiusculo()">MAIÚSCULO</button>
            <button onclick="minusculo()">minúsculo</button>
            <button onclick="formatarCNPJ()">formatar CNPJ</button>
        </div>
    </div>

    <!-- Calculadora -->
    <div class="card">
        <h2>Calculadora de Boletos</h2>

        <div class="linha-topo">
            <input type="date" id="data">
            <input type="text" id="valor" placeholder="Valor (ex: 100.50)">
        </div>

        <div class="linha-resultado">
            <div class="datas">
                <p>28 dias: <span id="d28"></span></p>
                <p>56 dias: <span id="d56"></span></p>
            </div>

            <div class="valor-lado">
                <p>Cada boleto</p>
                <span id="metade"></span>
            </div>
        </div>

        <hr>

        <input type="number" id="dias" placeholder="Dias personalizados">
        <p>Resultado: <span id="resultadoDias"></span></p>

    </div>


    <!-- Calculadora Desconto -->
    <div class="card">
        <h2>Calcular Desconto</h2>

        <input type="text" id="valorTabela" placeholder="Valor tabela (ex: 16465.69)">
        <input type="text" id="valorDesejado" placeholder="Valor desejado (ex: 13.900,00)">

        <p>Desconto: <span id="desconto"></span></p>
    </div>

    <!-- Oportunidades + Propostas -->
    <div class="card">
        <h2>Gerar Textos</h2>

        <input type="text" id="nomeCliente" placeholder="Nome do cliente">

        <p id="textoOportunidade"></p>
        <button onclick="copiarTexto('textoOportunidade')">Copiar</button>

        <hr>

        <input type="text" id="equipamento" placeholder="Equipamento">
        <input type="text" id="periodo" placeholder="Período (ex: 30 dias)">
        <input type="text" id="cidade" placeholder="Cidade">

        <p id="textoOrcamento"></p>
        <button onclick="copiarTexto('textoOrcamento')">Copiar</button>
    </div>


</div>

<script src="script.js"></script>
</body>

    <!-- Status rapido de copiar e cola -->   
    <div class="status-bar">
        <button onclick="gerarStatus('faturado')">Faturado💵</button>
        <button onclick="gerarStatus('renovacaoEmail')">Renovação 📧</button>
        <button onclick="gerarStatus('renovacaoZap')">Renovação 📞</button>        
        <button onclick="gerarStatus('autorizado')">Autorizado 📝</button>

        <span id="statusGerado"></span>
    </div>

</html>
